<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Boxy – Price Comparison</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: sans-serif; margin: 20px; background: #f7f9fc; display: flex; flex-direction: column; align-items: center; }
        
        .top-section { 
            display: flex; align-items: center; justify-content: space-between; gap: 20px; 
            background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; 
            max-width: 1300px; width: 100%; box-shadow: 0 2px 6px rgba(0,0,0,0.1); 
        }

        .filters { 
            margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; 
            max-width: 1300px; width: 100%; box-shadow: 0 2px 6px rgba(0,0,0,0.1); 
            display: flex; flex-wrap: nowrap; gap: 10px; align-items: flex-start;
        }

        .filters label { display: flex; flex-direction: column; font-size: 12px; font-weight: bold; color: #005bbb; }
        .filters label span { margin-bottom: 5px; }

        /* --- FORSOWANIE WIDOCZNOŚCI (CSS OVERRIDE) --- */
        
        /* Kontener główny */
        .select2-container--default .select2-selection--multiple {
            border: 1px solid #aaa !important;
            min-height: 40px !important;
            height: auto !important;
            display: block !important;
            background-color: #fff !important;
        }

        /* Lista pigułek */
        .select2-selection__rendered {
            display: block !important; /* Ważne dla zawijania wierszy */
            padding: 0 4px 4px 4px !important;
        }

        /* POJEDYNCZA PIGUŁKA */
        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background-color: #005bbb !important; /* Tło pigułki */
            border: 1px solid #004488 !important;
            border-radius: 4px !important;
            padding: 2px 8px !important;
            margin: 4px 4px 0 0 !important;
            float: left !important;
            color: #ffffff !important; /* Kolor tekstu */
        }

        /* TEKST W PIGUŁCE - KLUCZ DO CZYTELNOŚCI */
        .select2-container--default .select2-selection--multiple .select2-selection__choice__display {
            color: #ffffff !important; /* WYMUSZONY BIAŁY TEKST */
            padding-left: 5px !important;
            font-size: 12px !important;
            font-weight: normal !important;
        }

        /* IKS DO USUWANIA */
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
            color: #ffffff !important; /* BIAŁY IKS */
            border-right: 1px solid rgba(255,255,255,0.3) !important;
            margin-right: 5px !important;
            padding: 0 5px !important;
        }
        
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove:hover {
            background-color: #ff4444 !important;
            color: white !important;
        }

        /* Szerokości desktopowe */
        #filter-sklep + .select2-container { width: 240px !important; }
        #filter-sezon + .select2-container { width: 140px !important; }
        #filter-team + .select2-container { width: 240px !important; }
        #filter-producent + .select2-container { width: 180px !important; }
        #filter-typboxa + .select2-container { width: 180px !important; }

        table.dataTable thead th { background: #005bbb; color: white; }

        @media (max-width: 1100px) {
            .filters { flex-wrap: wrap; }
            .filters label { width: 100%; }
            .select2-container { width: 100% !important; }
        }
    </style>
</head>
<body>

<div class="top-section">
    <div class="top-left">
        <h1 id="ui-title">📦 Porównanie cen boxów</h1>
        <div style="margin-top: 10px;">
            <button id="lang-pl" style="padding: 5px 15px; cursor:pointer;">PL</button> 
            <button id="lang-en" style="padding: 5px 15px; cursor:pointer;">EN</button>
        </div>
    </div>
    <div class="top-right">
        <img src="logo_biwekson.jpg" alt="logo" style="width:120px; border-radius:10px;">
    </div>
</div>

<div class="filters">
    <label><span class="lbl-shop">Sklep:</span> <select id="filter-sklep" multiple="multiple"></select></label>
    <label><span class="lbl-season">Sezon:</span> <select id="filter-sezon" multiple="multiple"></select></label>
    <label><span class="lbl-team">Team:</span> <select id="filter-team" multiple="multiple"></select></label>
    <label><span class="lbl-brand">Brand:</span> <select id="filter-producent" multiple="multiple"></select></label>
    <label><span class="lbl-type">Typ boxa:</span> <select id="filter-typboxa" multiple="multiple"></select></label>
</div>

<table id="produkty" class="display" style="width:100%">
    <thead>
        <tr>
            <th>Produkt</th><th>Box</th><th>CCY</th><th>Sklep</th><th>Sezon</th>
            <th>Brand</th><th>Typ karty</th><th>Typ boxa</th><th>Team</th><th>Cena PLN</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
$(document).ready(function() {
    let table;
    let rawData = [];
    let currentLang = 'PL';

    const trans = {
        PL: { shop: "Sklep:", season: "Sezon:", team: "Team:", brand: "Brand:", type: "Typ boxa:", placeholder: "Wybierz..." },
        EN: { shop: "Shop:", season: "Season:", team: "Team:", brand: "Brand:", type: "Box Type:", placeholder: "Select..." }
    };

    function initSelect2() {
        $('select').select2({
            placeholder: trans[currentLang].placeholder,
            allowClear: true,
            closeOnSelect: false
        });
    }

    function fillFilter(columnIndex, selectId, reverse = false) {
        const select = $(selectId);
        const savedValues = select.val(); // Zapamiętaj wybrane

        // Pobierz unikalne dane z kolumny
        let data = [...new Set(table.column(columnIndex, {search:'applied'}).data().toArray().filter(d => d).map(d => d.trim()))];
        data.sort((a, b) => a.localeCompare(b, 'pl'));
        if (reverse) data.reverse();

        // Jeśli Select2 już istnieje, zniszcz go przed czyszczeniem HTML
        if (select.hasClass("select2-hidden-accessible")) {
            select.select2('destroy');
        }

        select.empty();
        data.forEach(d => {
            let option = new Option(d, d, false, (savedValues && savedValues.includes(d)));
            select.append(option);
        });

        // Re-inicjalizacja po wypełnieniu
        select.select2({
            placeholder: trans[currentLang].placeholder,
            allowClear: true,
            closeOnSelect: false
        });

        // Przywrócenie zaznaczenia
        if(savedValues) select.val(savedValues).trigger('change.select2');

        // Obsługa filtrowania
        select.off('change').on('change', function() {
            const vals = $(this).val();
            if (!vals || vals.length === 0) {
                table.column(columnIndex).search("").draw();
            } else {
                const regex = vals.map(v => '^' + v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '$').join('|');
                table.column(columnIndex).search(regex, true, false).draw();
            }
        });
    }

    function refreshAllFilters() {
        fillFilter(3, '#filter-sklep');
        fillFilter(4, '#filter-sezon', true);
        fillFilter(8, '#filter-team');
        fillFilter(5, '#filter-producent', true);
        fillFilter(7, '#filter-typboxa');
    }

    Papa.parse("export.csv", {
        download: true, header: true, delimiter: ";",
        complete: function(results) {
            results.data.forEach(function(row) {
                if (!row.Produkt) return;
                let cenaRaw = parseFloat(row.cena_box_PLN ? row.cena_box_PLN.replace(",", ".") : "0");
                $('#produkty tbody').append(`
                    <tr>
                        <td>${row.Produkt}</td><td>${row.Box}</td><td>${row.Waluta}</td>
                        <td>${row.Sklep}</td><td>${row.Sezon}</td><td>${row.Producent}</td>
                        <td>${row["Typ karty"]}</td><td>${row["Typ boxa"]}</td><td>${row.Team}</td>
                        <td data-order="${cenaRaw}"><strong>${cenaRaw.toFixed(2).replace(".", ",")}</strong></td>
                    </tr>
                `);
            });

            table = $('#produkty').DataTable({ pageLength: 25, responsive: true });
            initSelect2();
            refreshAllFilters();

            // Zmiana języka
            $('#lang-pl, #lang-en').click(function() {
                currentLang = (this.id === 'lang-pl') ? 'PL' : 'EN';
                $('.lbl-shop').text(trans[currentLang].shop);
                $('.lbl-season').text(trans[currentLang].season);
                $('.lbl-team').text(trans[currentLang].team);
                $('.lbl-brand').text(trans[currentLang].brand);
                $('.lbl-type').text(trans[currentLang].type);
                refreshAllFilters(); // Przebuduj filtry z nowym placeholderem
            });
        }
    });
});
</script>
</body>
</html>
