<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Boxy – Price Comparison</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root { --main-blue: #005bbb; --bg-light: #f0f4f8; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6B8DD6 100%);
            background-attachment: fixed;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        
        .top-section, .filters-container, .table-holder { 
            max-width: 1600px; width: 98%; box-sizing: border-box;
        }

        .top-section { 
            display: flex; align-items: center; justify-content: space-between; gap: 30px; 
            background: rgba(255, 255, 255, 0.95); padding: 25px 40px; border-radius: 15px; margin-bottom: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        /* STYLIZACJA POP-UP (MODAL) */
        .modal-overlay {
            display: none; /* Ukryty na starcie */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h2 { color: var(--main-blue); margin-top: 0; }
        .modal-content img { width: 120px; border-radius: 15px; margin: 15px 0; border: 3px solid var(--main-blue); }
        .modal-close {
            position: absolute; top: 10px; right: 15px;
            font-size: 24px; cursor: pointer; color: #999;
        }
        .modal-btn {
            display: inline-block;
            background: var(--main-blue);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .modal-btn:hover { background: #004488; }

        /* Reszta Twoich stylów */
        .top-left h1 { margin: 0 0 10px 0; color: var(--main-blue); font-size: 24px; }
        .info-row { font-size: 13px; margin-bottom: 5px; color: #333; }
        .top-right img { width: 150px; border-radius: 12px; }
        .filters-container { margin-bottom: 20px; background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 12px; display: flex; gap: 10px; }
        .filter-group { display: flex; flex-direction: column; flex: 1; }
        .table-holder { background: #fff; padding: 20px; border-radius: 12px; }
        table.dataTable thead th { background-color: var(--main-blue); color: white; padding: 12px; text-align: left; }
        .col-pln { font-weight: bold; color: var(--main-blue); text-align: right !important; }
        .col-price { text-align: right !important; }
    </style>
</head>
<body>

<div id="welcomeModal" class="modal-overlay">
    <div class="modal-content">
        <span class="modal-close" id="closeModal">&times;</span>
        <h2>Support me! 🚀</h2>
        <p>Follow me on TikTok for more updates and box breaks!</p>
        <a id="modal-link" href="#" target="_blank">
            <img src="logo_biwekson.jpg" alt="Logo">
        </a>
        <br>
        <a id="modal-btn-link" href="#" target="_blank" class="modal-btn">Visit TikTok</a>
    </div>
</div>

<div class="top-section">
    <div class="top-left">
        <h1 id="ui-title">📦 Porównanie cen boxów</h1>
        <div class="info-row">
            <strong id="ui-rates-lbl">Kursy:</strong> EUR: <span id="eurpln">...</span> | USD: <span id="usdpln">...</span> | UK Tax: <span id="gbptax">...</span>
        </div>
        <div class="info-row">
            <strong>Socials:</strong> 
            <a id="link-tiktok" href="#" target="_blank">TikTok</a> | 
            <a id="link-insta" href="#" target="_blank">Instagram</a>
        </div>
        <div class="info-row">
            <strong id="ui-update-lbl">Aktualizacja:</strong> <span id="last-update">...</span>
        </div>
        <div id="ui-description">...</div>
        <div style="margin-top: 15px;">
            <button id="btn-pl" style="cursor:pointer; padding: 5px 12px; border-radius: 4px; border: 1px solid #ccc;">PL</button>
            <button id="btn-en" style="cursor:pointer; padding: 5px 12px; border-radius: 4px; border: 1px solid #ccc;">EN</button>
        </div>
    </div>
    <div class="top-right">
        <a id="link-logo" href="#" target="_blank">
            <img src="logo_biwekson.jpg" alt="Logo">
        </a>
    </div>
</div>

<div class="filters-container">
    <div class="filter-group"><label id="lbl-shop">Sklep:</label><select id="f-shop" multiple="multiple"></select></div>
    <div class="filter-group"><label id="lbl-season">Sezon:</label><select id="f-season" multiple="multiple"></select></div>
    <div class="filter-group"><label id="lbl-team">Drużyna:</label><select id="f-team" multiple="multiple"></select></div>
    <div class="filter-group"><label id="lbl-brand">Marka:</label><select id="f-brand" multiple="multiple"></select></div>
    <div class="filter-group"><label id="lbl-type">Typ:</label><select id="f-type" multiple="multiple"></select></div>
</div>

<div class="table-holder">
    <table id="mainTable" class="display nowrap" style="width:100%">
        <thead>
            <tr>
                <th>Produkt</th><th>Cena</th><th>Waluta</th><th>Sklep</th><th>Sezon</th>
                <th>Marka</th><th>Typ</th><th>Drużyna</th><th>Cena PLN</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
$(document).ready(function() {
    let table;
    let config = {};

    // Obsługa Pop-upu
    function showModal() {
        $('#welcomeModal').css('display', 'flex');
    }
    $('#closeModal, #welcomeModal').click(function(e) {
        if (e.target !== this) return; // Nie zamykaj jeśli kliknięto wewnątrz białego okna
        $('#welcomeModal').hide();
    });

    const langData = {
        PL: { title: "📦 Porównanie cen boxów", shop: "Sklep:", season: "Sezon:", team: "Drużyna:", brand: "Marka:", type: "Typ:", placeholder: "Wszystkie", h: ["Produkt", "Cena", "Waluta", "Sklep", "Sezon", "Marka", "Typ", "Drużyna", "Cena PLN"] },
        EN: { title: "📦 Box Price Comparison", shop: "Shop:", season: "Season:", team: "Team:", brand: "Brand:", type: "Type:", placeholder: "All", h: ["Product", "Price", "CCY", "Shop", "Season", "Brand", "Type", "Team", "Price PLN"] }
    };

    function updateLanguage(lang) {
        const d = langData[lang];
        $("#ui-title").text(d.title);
        $("#lbl-shop").text(d.shop); $("#lbl-season").text(d.season); $("#lbl-team").text(d.team); $("#lbl-brand").text(d.brand); $("#lbl-type").text(d.type);
        $('#mainTable thead th').each(function(i) { $(this).text(d.h[i]); });
        $('select').each(function() { $(this).select2({ placeholder: d.placeholder }); });
    }

    function fillFilter(columnIndex, selectId, desc = false) {
        const select = $(selectId);
        let uniqueData = table.column(columnIndex).data().unique().sort().toArray();
        if (desc) uniqueData.reverse();
        select.empty();
        uniqueData.forEach(item => { if(item) select.append(new Option(item, item)); });
        select.on('change', function() {
            let vals = $(this).val();
            if(!vals || vals.length === 0) table.column(columnIndex).search('').draw();
            else {
                let pattern = vals.map(v => '^' + $.fn.dataTable.util.escapeRegex(v) + '$').join('|');
                table.column(columnIndex).search(pattern, true, false).draw();
            }
        });
    }

    Papa.parse("config.csv", {
        download: true, header: false, delimiter: ";", complete: function(results) {
            results.data.forEach(row => { if(row[0]) config[row[0].trim()] = row[1].trim(); });
            $("#eurpln").text(config.EUR || "---");
            $("#usdpln").text(config.USD || "---");
            if(config.GB_Tax) $("#gbptax").text((parseFloat(config.GB_Tax.replace(',','.')) * 100).toFixed(0) + "%");
            
            // Ustawienie linków w pop-upie i na stronie
            if(config.TIKTOK_LINK) { 
                $("#link-tiktok, #link-logo, #modal-link, #modal-btn-link").attr("href", config.TIKTOK_LINK); 
            }
            if(config.INSTAGRAM_LINK) $("#link-insta").attr("href", config.INSTAGRAM_LINK);
            
            updateLanguage('PL');
            
            // POKAŻ POP-UP PO ZAŁADOWANIU KONFIGURACJI
            showModal();
        }
    });

    Papa.parse("export.csv", {
        download: true, header: true, delimiter: ";", complete: function(results) {
            results.data.forEach(row => {
                if(!row.Produkt) return;
                let cOrig = parseFloat(row.Box ? row.Box.replace(',','.') : 0);
                let cPLN = parseFloat(row.cena_box_PLN ? row.cena_box_PLN.replace(',','.') : 0);
                $('#mainTable tbody').append(`
                    <tr>
                        <td>${row.Produkt}</td>
                        <td class="col-price" data-order="${cOrig}">${cOrig.toFixed(2)}</td>
                        <td>${row.Waluta}</td>
                        <td>${row.Sklep}</td>
                        <td>${row.Sezon}</td>
                        <td>${row.Producent}</td>
                        <td>${row["Typ boxa"]}</td>
                        <td>${row.Team}</td>
                        <td class="col-pln" data-order="${cPLN}">${cPLN.toFixed(2)}</td>
                    </tr>
                `);
            });
            table = $('#mainTable').DataTable({ pageLength: 25, responsive: false, order: [[8, "asc"]] });
            $('select').select2({ placeholder: "Wszystkie", allowClear: true, closeOnSelect: false, width: '100%' });
            fillFilter(3, '#f-shop'); fillFilter(4, '#f-season', true); fillFilter(7, '#f-team'); fillFilter(5, '#f-brand', true); fillFilter(6, '#f-type');
            $("#btn-pl").click(() => updateLanguage('PL'));
            $("#btn-en").click(() => updateLanguage('EN'));
        }
    });
});
</script>
</body>
</html>
