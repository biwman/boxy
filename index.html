<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Boxy – Price Comparison</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS zewnętrzne -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />

    <!-- JS zewnętrzne -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* ======================= 0) ZMIENNE ======================= */
        :root {
            --main-blue: #005bbb;
            --bg-light: #f0f4f8;
        }

        /* ======================= 1) TŁO STRONY ======================= */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6B8DD6 100%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ======================= 2) SEKCJA GÓRNA ======================= */
        .top-section,
        .filters-container,
        .table-holder {
            max-width: 1600px;
            width: 98%;
            box-sizing: border-box;
        }

        .top-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px 40px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        .top-left h1 {
            margin: 0 0 10px 0;
            color: var(--main-blue);
            font-size: 24px;
        }

        .info-row {
            font-size: 13px;
            margin-bottom: 5px;
            color: #333;
            line-height: 1.4;
        }

        #ui-description {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            font-style: italic;
            max-width: 800px;
        }

        .top-right a {
            display: block;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .top-right a:hover {
            transform: scale(1.05);
        }

        .top-right img {
            width: 150px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: block;
        }

        /* ======================= 3) FILTRY ======================= */
        .filters-container {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: bold;
            color: var(--main-blue);
            margin-bottom: 6px;
        }

        .select2-container--default .select2-selection--multiple {
            border: 1px solid #ced4da !important;
            min-height: 38px !important;
            border-radius: 6px !important;
        }

        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background-color: var(--main-blue) !important;
            color: #ffffff !important;
            border: none !important;
            padding: 2px 8px !important;
            margin-top: 5px !important;
            font-size: 12px !important;
        }

        /* ======================= 4) TABELA ======================= */
        .table-holder {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            overflow-x: auto;
            overflow-y: visible;
        }

        table.dataTable {
            width: 100% !important;
            margin: 0 !important;
            border-collapse: separate;
            border-spacing: 0;
        }

        table.dataTable thead th {
            background-color: var(--main-blue);
            color: white;
            border: none;
            padding: 12px;
            text-align: left;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 2px rgba(0,0,0,0.1);
        }

        .col-pln {
            font-weight: bold;
            color: var(--main-blue);
            text-align: right !important;
        }

        .col-price {
            text-align: right !important;
            padding-right: 20px !important;
        }

        /* ======================= 5) POP-UP MODAL ======================= */
        #welcomeModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #666;
            font-weight: bold;
        }

        .modal-content img {
            width: 150px;
            border-radius: 12px;
            margin: 15px 0;
        }

        .modal-content h2 {
            margin-top: 0;
            color: var(--main-blue);
        }

        /* ======================= 6) RESPONSYWNOŚĆ ======================= */
        @media (max-width: 1100px) {
            .filters-container {
                flex-wrap: wrap;
            }
            .filter-group {
                flex: 1 1 200px;
            }
            .top-section {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 600px) {
            /* Top section */
            .top-section {
                padding: 15px;
                gap: 15px;
            }
            .top-left h1 {
                font-size: 18px;
            }
            .top-left .info-row {
                font-size: 11px;
            }
            #btn-pl, #btn-en {
                padding: 4px 8px;
                font-size: 11px;
            }
            .top-right img {
                width: 100px;
            }

            /* Filtry */
            .filters-container {
                flex-direction: column;
                gap: 8px;
            }
            .filter-group {
                min-width: 100%;
            }

            /* Tabela */
            table.dataTable td, table.dataTable th {
                padding: 6px 8px !important;
                font-size: 12px;
            }
            .table-holder {
                padding-right: 10px;
            }

            /* Sticky header */
            table.dataTable thead th {
                position: sticky;
                top: 0;
                z-index: 30;
                background-color: var(--main-blue);
            }

            /* Popup */
            #welcomeModal {
                align-items: center;
                overflow-y: auto;
                padding-top: 0;
            }
            .modal-content {
                max-width: 90%;
                margin: 0 auto;
                max-height: 90vh;
                overflow-y: auto;
                padding: 20px;
            }
            .modal-content img {
                width: 120px;
            }
            .modal-content h2 {
                font-size: 18px;
            }
            .modal-content p {
                font-size: 12px;
            }
        }

        /* ======================= 4b) WYRAŹNIEJSZE KOLORY TABELI ======================= */
        table.dataTable tbody tr:nth-child(odd) {
            background-color: #e3f2fd; /* jasny niebieski */
        }

        table.dataTable tbody tr:nth-child(even) {
            background-color: #ffffff; /* biały */
        }

        table.dataTable tbody tr:hover {
            background-color: #90caf9 !important; /* mocniejszy niebieski */
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        table.dataTable tbody td:hover {
            background-color: #64b5f6 !important;
            color: #fff;
        }

        /* ======================= EFEKT HOVER NA FLAGACH ======================= */
        #btn-pl:hover, #btn-en:hover {
            transform: scale(1.2);
            transition: transform 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        /* ======================= 7) DODATKOWE FLAGI ======================= */
        td img {
            border-radius: 2px;
            box-shadow: 0 0 2px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <!-- ======================= MODAL ======================= -->
    <div id="welcomeModal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Support me!</h2>
            <p>Follow me on TikTok</p>
            <a id="modal-link" href="#" target="_blank">
                <img src="logo_biwekson.jpg" alt="Logo">
            </a>
        </div>
    </div>

    <!-- ======================= SEKCJA GÓRNA ======================= -->
    <div class="top-section">
        <div class="top-left">
            <h1 id="ui-title">📦 Porównanie cen boxów kart piłkarskich</h1>
            <div class="info-row">
                <strong id="ui-rates-lbl">Kursy:</strong>
                EUR: <span id="eurpln">...</span> |
                USD: <span id="usdpln">...</span> |
                UK Tax: <span id="gbptax">...</span>
            </div>
            <div class="info-row">
                <strong>Socials:</strong>
                <a id="link-tiktok" href="#" target="_blank">TikTok</a> |
                <a id="link-insta" href="#" target="_blank">Instagram</a> |
                <a id="link-vinted" href="#" target="_blank">Vinted</a>
            </div>
            <div class="info-row">
                <strong id="ui-update-lbl">Aktualizacja:</strong>
                <span id="last-update">...</span>
            </div>
            <div class="info-row">
                <strong>Liczba odwiedzin:</strong>
                <span id="visit-count">...</span>
            </div>
            <div id="ui-description">...</div>
            <div style="margin-top: 15px;">
                <img id="btn-pl" src="flag_pl.png" alt="Polska" style="width:30px; height:20px; cursor:pointer; margin-right:8px; border:1px solid #ccc; border-radius:3px;">
                <img id="btn-en" src="flag_uk.png" alt="UK" style="width:30px; height:20px; cursor:pointer; border:1px solid #ccc; border-radius:3px;">
            </div>
        </div>

        <div class="top-right">
            <a id="link-logo" href="#" target="_blank">
                <img src="logo_biwekson.jpg" alt="Logo">
            </a>
        </div>
    </div>

    <!-- ======================= FILTRY ======================= -->
    <div class="filters-container">
        <div class="filter-group">
            <label id="lbl-shop">Sklep:</label>
            <select id="f-shop" multiple="multiple"></select>
        </div>
        <div class="filter-group">
            <label id="lbl-season">Sezon:</label>
            <select id="f-season" multiple="multiple"></select>
        </div>
        <div class="filter-group">
            <label id="lbl-team">Drużyna:</label>
            <select id="f-team" multiple="multiple"></select>
        </div>
        <div class="filter-group">
            <label id="lbl-brand">Marka:</label>
            <select id="f-brand" multiple="multiple"></select>
        </div>
        <div class="filter-group">
            <label id="lbl-type">Typ:</label>
            <select id="f-type" multiple="multiple"></select>
        </div>
    </div>

    <!-- ======================= TABELA ======================= -->
    <div class="table-holder">
        <table id="mainTable" class="display nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>Produkt</th>
                    <th>Cena</th>
                    <th>Waluta</th>
                    <th>Sklep</th>
                    <th>Sezon</th>
                    <th>Marka</th>
                    <th>Typ</th>
                    <th>Drużyna</th>
                    <th>Cena PLN</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ======================= JS ======================= -->
    <script>
        $(document).ready(function() {

            let table;
            let config = {};
            let shopCountryMap = {};

            // ======================= Wczytywanie sklepów =======================
            Papa.parse("sklepy.csv", {
                download: true,
                header: true,
                delimiter: ";",
                complete: function(results) {
                    results.data.forEach(row => {
                        if(row.SKLEP && row.KRAJ) {
                            shopCountryMap[row.SKLEP.trim()] = row.KRAJ.trim().toLowerCase();
                        }
                    });
                }
            });

            // ======================= Dane językowe =======================
            const langData = {
                PL: {
                    title: "📦 Porównanie cen boxów kart piłkarskich",
                    shop: "Sklep:",
                    season: "Sezon:",
                    team: "Drużyna:",
                    brand: "Marka:",
                    type: "Typ:",
                    placeholder: "Wszystkie",
                    rates: "Kursy:",
                    update: "Aktualizacja:",
                    h: ["Produkt", "Cena", "Waluta", "Sklep", "Sezon", "Marka", "Typ", "Drużyna", "Cena PLN"]
                },
                EN: {
                    title: "📦 Soccer Box Price Comparison",
                    shop: "Shop:",
                    season: "Season:",
                    team: "Team:",
                    brand: "Brand:",
                    type: "Type:",
                    placeholder: "All",
                    rates: "Rates:",
                    update: "Update:",
                    h: ["Product", "Price", "CCY", "Shop", "Season", "Brand", "Type", "Team", "Price PLN"]
                }
            };

            // ======================= Funkcja zwracająca flagę dla sklepu =======================
            function getFlagForShop(shop) {
                if(!shop) return "";
                const normalizedShop = shop.replace(/^https?:\/\//, '').replace(/^www\./, '').trim();
                const key = Object.keys(shopCountryMap).find(k => {
                    const normalizedKey = k.replace(/^www\./, '').trim();
                    return normalizedShop.includes(normalizedKey) || normalizedKey.includes(normalizedShop);
                });
                if(!key) return "";
                let code = shopCountryMap[key].toLowerCase();
                return `<img src="https://flagcdn.com/20x15/${code}.png" style="margin-right:6px; vertical-align:middle;">`;
            }

            // ======================= Aktualizacja języka =======================
            function updateLanguage(lang) {
                const d = langData[lang];
                $("#ui-title").text(d.title);
                $("#lbl-shop").text(d.shop);
                $("#lbl-season").text(d.season);
                $("#lbl-team").text(d.team);
                $("#lbl-brand").text(d.brand);
                $("#lbl-type").text(d.type);
                $("#ui-rates-lbl").text(d.rates);
                $("#ui-update-lbl").text(d.update);
                $("#ui-description").text(lang === 'PL' ? config.OPIS_PL : config.OPIS_EN);

                // Zmieniamy nagłówki tabeli
                $('#mainTable thead th').each(function(i) {
                    if(i === 8) {
                        $(this).text(lang === 'PL' ? 'Cena PLN' : 'Price_EUR');
                    } else {
                        $(this).text(d.h[i]);
                    }
                });

                const eurRate = parseFloat(config.EUR ? config.EUR.replace(',','.') : 1);

                // Aktualizacja ostatniej kolumny w DataTables
                table.rows().every(function(rowIdx) {
                    const rowNode = this.node();
                    const $td = $(rowNode).find('td:eq(8)');
                    let pricePLN = parseFloat($td.attr('data-pln'));
                    if(isNaN(pricePLN)) pricePLN = 0;

                    if(lang === 'EN') {
                        const priceEUR = pricePLN / eurRate;
                        this.cell(rowIdx, 8).data(priceEUR.toFixed(2));
                        $td.data('order', priceEUR);
                    } else {
                        this.cell(rowIdx, 8).data(pricePLN.toFixed(2));
                        $td.data('order', pricePLN);
                    }
                });

                table.draw(false);

                // Odśwież placeholdery Select2
                $('select').each(function() {
                    $(this).select2({ placeholder: d.placeholder });
                });
            }

            // ======================= Wypełnianie filtrów =======================
function fillFilter(columnIndex, selectId, desc = false) {
    const select = $(selectId);

    let uniqueData = table.column(columnIndex).nodes().to$().map(function() {
        if(columnIndex === 3) {
            return $(this).data('shop');
        } else {
            return $(this).text().trim();
        }
    }).get();

    uniqueData = [...new Set(uniqueData)].sort();

    if(desc) uniqueData.reverse();

    select.empty();
    uniqueData.forEach(item => {
        if(item) select.append(new Option(item, item));
    });

    select.on('change', function() {
        let vals = $(this).val();
        if(!vals || vals.length === 0) {
            table.column(columnIndex).search('').draw();
        } else {
            let pattern = vals.map(v => '^' + $.fn.dataTable.util.escapeRegex(v) + '$').join('|');
            table.column(columnIndex).search(pattern, true, false).draw();
        }
    });
}


            

            // ======================= Wczytanie konfiguracji =======================
            Papa.parse("config.csv", {
                download: true,
                header: false,
                delimiter: ";",
                complete: function(results) {
                    results.data.forEach(row => {
                        if(row[0]) config[row[0].trim()] = row[1].trim();
                    });

                    $("#eurpln").text(config.EUR || "---");
                    $("#usdpln").text(config.USD || "---");
                    if(config.GB_Tax) $("#gbptax").text((parseFloat(config.GB_Tax.replace(',','.')) * 100).toFixed(0) + "%");

                    if(config.TIKTOK_LINK) $("#link-tiktok, #link-logo, #modal-link").attr("href", config.TIKTOK_LINK);
                    if(config.INSTAGRAM_LINK) $("#link-insta").attr("href", config.INSTAGRAM_LINK);
                    if(config.VINTED_LINK) $("#link-vinted").attr("href", config.VINTED_LINK);

                    if(config.OSTATNIE_URUCHOMIENIE) {
                        $("#last-update").text(config.OSTATNIE_URUCHOMIENIE);
                    }

                    // Pokazujemy modal po załadowaniu konfiguracji
                    $("#welcomeModal").css("display", "flex");
                }
            });

            // ======================= Wczytanie danych tabeli =======================
            Papa.parse("export.csv", {
                download: true,
                header: true,
                delimiter: ";",
                complete: function(results) {
                    results.data.forEach(row => {
                        if(!row.Produkt) return;

                        let cenaOryginalna = parseFloat(row.Box ? row.Box.replace(',','.') : 0);
                        let cenaPLN = parseFloat(row.cena_box_PLN ? row.cena_box_PLN.replace(',','.') : 0);

let shopUrl = row.Sklep.startsWith('http') ? row.Sklep : 'https://' + row.Sklep;

                        $('#mainTable tbody').append(`
                            <tr>
                                <td>${row.Produkt}</td>
                                <td class="col-price" data-order="${cenaOryginalna}">${cenaOryginalna.toFixed(2)}</td>
                                <td>${row.Waluta}</td>
                                

<td data-shop="${row.Sklep}">
  ${getFlagForShop(row.Sklep)}
  <a href="${shopUrl}" target="_blank">${row.Sklep}</a>
</td>
                                <td>${row.Sezon}</td>
                                <td>${row.Producent}</td>
                                <td>${row["Typ boxa"]}</td>
                                <td>${row.Team}</td>
                                <td class="col-pln" data-order="${cenaPLN}" data-pln="${cenaPLN}">${cenaPLN.toFixed(2)}</td>
                            </tr>
                        `);
                    });

                    table = $('#mainTable').DataTable({
                        pageLength: 25,
                        responsive: false,
                        order: [[8, "asc"]]
                    });

                    updateLanguage('PL');

                    $('select').select2({
                        placeholder: "Wszystkie",
                        allowClear: true,
                        closeOnSelect: false,
                        width: '100%'
                    });

                    fillFilter(3, '#f-shop');
                    fillFilter(4, '#f-season', true);
                    fillFilter(7, '#f-team');
                    fillFilter(5, '#f-brand', true);
                    fillFilter(6, '#f-type');

                    $("#btn-pl").click(() => updateLanguage('PL'));
                    $("#btn-en").click(() => updateLanguage('EN'));
                }
            });

            // ======================= LOGIKA ZAMYKANIA MODALA =======================
            $(".modal-close, #welcomeModal").click(function(e) {
                if (e.target !== this && !$(e.target).hasClass('modal-close')) return;
                $("#welcomeModal").fadeOut(200);
            });
        });

        // ======================= LICZNIK ODWIEDZIN =======================
        window.addEventListener('load', function() {
            fetch('https://api.counterapi.dev/v1/boxy-cennik/visits/up')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('visit-count').innerText = data.count;
                })
                .catch(err => {
                    console.log("Błąd licznika:", err);
                    document.getElementById('visit-count').innerText = "N/A";
                });
        });
    </script>

</body>
</html>
