<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Moja tabela – sklep style</title>

  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    h1 { text-align: center; margin-bottom: 20px; color: #333; }
    .filter-container { margin-bottom: 15px; text-align: center; }
    .filter-container select { margin: 0 10px; padding: 5px 8px; border-radius: 5px; border: 1px solid #ccc; background: #fff; }
    table.dataTable { border-collapse: separate !important; border-spacing: 0 5px; width: 100% !important; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    table.dataTable thead th { background-color: #4CAF50; color: #fff; text-align: center; padding: 10px; }
    table.dataTable tbody td { padding: 8px; text-align: center; }
    table.dataTable tbody tr:nth-child(odd) { background-color: #f9f9f9; }
    table.dataTable tbody tr:hover { background-color: #e0f7fa; }
    .dataTables_wrapper .dataTables_paginate .paginate_button { background: #4CAF50; color: white !important; border-radius: 4px; margin: 0 2px; padding: 5px 10px; }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current { background: #45a049 !important; }
    .dataTables_wrapper .dataTables_filter input { border-radius: 5px; border: 1px solid #ccc; padding: 5px 8px; }
  </style>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</head>
<body>

<h1>📊 Moje dane – sklep style</h1>

<div class="filter-container">
  <label>Sklep: <select id="filter-sklep"><option value="">Wszystkie</option></select></label>
  <label>Sezon: <select id="filter-sezon"><option value="">Wszystkie</option></select></label>
  <label>Team: <select id="filter-team"><option value="">Wszystkie</option></select></label>
</div>

<table id="myTable" class="display"></table>

<script>
fetch('export.csv')
  .then(response => response.text())
  .then(csv => {
    csv = csv.replace(/^\uFEFF/, '');
    const rows = csv.trim().split('\n').map(r => r.split(';').map(c => c.trim()));
    const headers = rows[0].map(h => ({ title: h }));
    const colCount = headers.length;

    const data = rows.slice(1).map(r => {
      while (r.length < colCount) r.push('');
      return r.map((val, i) => {
        if (i === colCount - 1 && val !== '') {
          return parseFloat(val.replace(',', '.'));
        }
        return val;
      });
    });

    const table = $('#myTable').DataTable({
      data: data,
      columns: headers,
      pageLength: 25,
      columnDefs: [
        {
          targets: colCount - 1,
          render: function(data, type) {
            if (type === 'display' || type === 'filter') {
              return data.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
            return data;
          }
        }
      ]
    });

    // 🔥 POPRAWIONE INDEKSY
    fillFilter(2, '#filter-sklep');   // Sklep
    fillFilter(4, '#filter-sezon');   // Sezon
    fillFilter(8, '#filter-team');    // Team

    function fillFilter(colIndex, selectId) {
      const values = [...new Set(data.map(r => r[colIndex]))].sort();
      values.forEach(v => $(selectId).append(`<option value="${v}">${v}</option>`));
    }

    $('#filter-sklep, #filter-sezon, #filter-team').on('change', function() {
      table.draw();
    });

    $.fn.dataTable.ext.search.push(function(settings, row) {
      const sklep = $('#filter-sklep').val();
      const sezon = $('#filter-sezon').val();
      const team = $('#filter-team').val();

      return (sklep === "" || row[2] === sklep) &&
             (sezon === "" || row[4] === sezon) &&
             (team === "" || row[8] === team);
    });

  })
  .catch(err => console.error('Błąd wczytywania CSV:', err));
</script>

</body>
</html>
