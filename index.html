<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Boxy – Price Comparison</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root { --main-blue: #005bbb; --bg-light: #f7f9fc; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: linear-gradient(135deg, #e3f2fd, #f7f9fc); display: flex; flex-direction: column; align-items: center; }
        
        /* NAGŁÓWEK */
        .top-section { 
            display: flex; align-items: center; justify-content: space-between; gap: 30px; 
            background: #ffffff; padding: 25px 40px; border-radius: 15px; margin-bottom: 20px; 
            max-width: 1300px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            box-sizing: border-box;
        }
        .top-left h1 { margin: 0 0 15px 0; color: var(--main-blue); font-size: 26px; }
        .info-row { font-size: 14px; margin-bottom: 6px; color: #333; }
        .top-right img { width: 160px; height: auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* FILTRY */
        .filters-container { 
            margin-bottom: 20px; background: #ffffff; padding: 20px; border-radius: 12px; 
            max-width: 1300px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            display: flex; flex-wrap: nowrap; gap: 10px; box-sizing: border-box;
        }
        .filter-group { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .filter-group label { font-size: 12px; font-weight: bold; color: var(--main-blue); margin-bottom: 6px; white-space: nowrap; }

        /* WYMUSZENIE WIDOCZNOŚCI PIGUŁEK SELECT2 */
        .select2-container--default .select2-selection--multiple {
            border: 1px solid #ced4da !important; min-height: 38px !important; border-radius: 6px !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background-color: var(--main-blue) !important;
            color: #ffffff !important;
            border: none !important;
            padding: 2px 8px !important;
            margin-top: 5px !important;
            font-size: 12px !important;
        }
        .select2-selection__choice__display { color: #ffffff !important; padding-left: 4px !important; }
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
            color: #ffffff !important; margin-right: 5px !important; opacity: 0.7;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove:hover { opacity: 1; background: none; }

        /* TABELA */
        .table-holder { width: 100%; max-width: 1300px; background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        table.dataTable thead th { background-color: var(--main-blue); color: white; border: none; padding: 12px; }
        
        @media (max-width: 1100px) {
            .filters-container { flex-wrap: wrap; }
            .filter-group { flex: 1 1 200px; }
            .top-section { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="top-section">
    <div class="top-left">
        <h1 id="ui-title">📦 Porównanie cen boxów</h1>
        <div class="info-row">
            <strong>Kursy:</strong> EUR: <span id="eurpln">...</span> | USD: <span id="usdpln">...</span> | Tax: <span id="gbptax">...</span>
        </div>
        <div class="info-row">
            <strong>Biwekson & Friends:</strong> 
            <a href="https://www.tiktok.com/@biwekson" target="_blank">TikTok</a> | 
            <a href="https://www.instagram.com/biwekson/" target="_blank">Instagram</a>
        </div>
        <div class="info-row" id="ui-update-row">
            <strong>Aktualizacja:</strong> <span id="last-update">...</span>
        </div>
        <div style="margin-top: 15px;">
            <button id="btn-pl" style="cursor:pointer; padding: 5px 12px;">PL</button>
            <button id="btn-en" style="cursor:pointer; padding: 5px 12px;">EN</button>
        </div>
    </div>
    <div class="top-right">
        <img src="logo_biwekson.jpg" alt="Logo">
    </div>
</div>

<div class="filters-container">
    <div class="filter-group">
        <label id="lbl-shop">Sklep:</label>
        <select id="f-shop" multiple="multiple"></select>
    </div>
    <div class="filter-group">
        <label id="lbl-season">Sezon:</label>
        <select id="f-season" multiple="multiple"></select>
    </div>
    <div class="filter-group">
        <label id="lbl-team">Team:</label>
        <select id="f-team" multiple="multiple"></select>
    </div>
    <div class="filter-group">
        <label id="lbl-brand">Marka:</label>
        <select id="f-brand" multiple="multiple"></select>
    </div>
    <div class="filter-group">
        <label id="lbl-type">Typ boxa:</label>
        <select id="f-type" multiple="multiple"></select>
    </div>
</div>

<div class="table-holder">
    <table id="mainTable" class="display responsive nowrap" style="width:100%">
        <thead>
            <tr>
                <th>Produkt</th><th>Box</th><th>CCY</th><th>Sklep</th><th>Sezon</th>
                <th>Brand</th><th>Karta</th><th>Typ</th><th>Team</th><th>Cena PLN</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
$(document).ready(function() {
    let table;
    let currentLang = 'PL';

    const langData = {
        PL: { title: "📦 Porównanie cen boxów", shop: "Sklep:", season: "Sezon:", team: "Team:", brand: "Marka:", type: "Typ boxa:", placeholder: "Wszystkie" },
        EN: { title: "📦 Box Price Comparison", shop: "Shop:", season: "Season:", team: "Team:", brand: "Brand:", type: "Box Type:", placeholder: "All" }
    };

    function initSelect2() {
        $('select').select2({
            placeholder: langData[currentLang].placeholder,
            allowClear: true,
            closeOnSelect: false,
            width: '100%'
        });
    }

    function updateLanguage(lang) {
        currentLang = lang;
        const d = langData[lang];
        $("#ui-title").text(d.title);
        $("#lbl-shop").text(d.shop);
        $("#lbl-season").text(d.season);
        $("#lbl-team").text(d.team);
        $("#lbl-brand").text(d.brand);
        $("#lbl-type").text(d.type);
        
        // Odświeżenie placeholderów w Select2 bez niszczenia zaznaczeń
        $('select').each(function() {
            $(this).select2({ placeholder: d.placeholder });
        });
    }

    function fillFilter(columnIndex, selectId) {
        const select = $(selectId);
        let uniqueData = table.column(columnIndex).data().unique().sort().toArray();
        
        select.empty();
        uniqueData.forEach(item => {
            if(item) select.append(new Option(item, item));
        });

        select.on('change', function() {
            let vals = $(this).val();
            if(!vals || vals.length === 0) {
                table.column(columnIndex).search('').draw();
            } else {
                let pattern = vals.map(v => '^' + $.fn.dataTable.util.escapeRegex(v) + '$').join('|');
                table.column(columnIndex).search(pattern, true, false).draw();
            }
        });
    }

    // Ładowanie CONFIG (Kursy itp.)
    Papa.parse("config.csv", {
        download: true, header: false, delimiter: ";", complete: function(results) {
            results.data.forEach(row => {
                if(row[0] === 'EUR') $("#eurpln").text(row[1]);
                if(row[0] === 'USD') $("#usdpln").text(row[1]);
                if(row[0] === 'GB_Tax') $("#gbptax").text(row[1]);
                if(row[0] === 'OSTATNIE_URUCHOMIENIE') {
                    let d = new Date((parseFloat(row[1].replace(',','.')) - 25569) * 86400 * 1000);
                    $("#last-update").text(d.toLocaleString());
                }
            });
        }
    });

    // Ładowanie DANYCH
    Papa.parse("export.csv", {
        download: true, header: true, delimiter: ";", complete: function(results) {
            results.data.forEach(row => {
                if(!row.Produkt) return;
                let cena = parseFloat(row.cena_box_PLN ? row.cena_box_PLN.replace(',','.') : 0);
                $('#mainTable tbody').append(`
                    <tr>
                        <td>${row.Produkt}</td><td>${row.Box}</td><td>${row.Waluta}</td>
                        <td>${row.Sklep}</td><td>${row.Sezon}</td><td>${row.Producent}</td>
                        <td>${row["Typ karty"]}</td><td>${row["Typ boxa"]}</td><td>${row.Team}</td>
                        <td data-order="${cena}"><strong>${cena.toFixed(2)}</strong></td>
                    </tr>
                `);
            });

            table = $('#mainTable').DataTable({ pageLength: 25, responsive: true });
            
            // Inicjalizacja filtrów
            initSelect2();
            fillFilter(3, '#f-shop');
            fillFilter(4, '#f-season');
            fillFilter(8, '#f-team');
            fillFilter(5, '#f-brand');
            fillFilter(7, '#f-type');

            $("#btn-pl").click(() => updateLanguage('PL'));
            $("#btn-en").click(() => updateLanguage('EN'));
        }
    });
});
</script>
</body>
</html>
