<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title id="page-title">Boxy – Tabela produktów</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: linear-gradient(135deg, #e3f2fd, #f7f9fc);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
            background: #ffffff;
            padding: 25px 40px;
            border-radius: 12px;
            margin: 0 auto 20px auto;
            max-width: 1200px;
            width: 100%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .top-left {
            flex: 1.5;
        }

        .top-left h1 {
            margin-top: 0;
            color: #005bbb;
        }

        .rates {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .creator {
            font-size: 14px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .update {
            font-size: 13px;
            color: #444;
        }

        .top-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .top-right img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 20px;
            transition: 0.2s;
        }

        .top-right img:hover {
            transform: scale(1.08);
        }

        .filters {
            margin-bottom: 20px;
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            max-width: 1200px;
            width: 100%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            box-sizing: border-box;
        }

        .filters label {
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }

        #filter-sklep + .select2-container,
        #filter-team + .select2-container {
            width: 260px !important;
        }

        #filter-sezon + .select2-container,
        #filter-producent + .select2-container,
        #filter-typboxa + .select2-container {
            width: 160px !important;
        }

        table {
            font-size: 14px;
            max-width: 1200px;
            width: 100%;
        }

        table.dataTable thead th {
            background: #005bbb;
            color: white;
        }

        .select2-container {
            min-width: 170px;
        }

        @media (max-width: 768px) {
            .top-section {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }
            .top-right img {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>

<body>

<div class="top-section">

    <div class="top-left">
        <h1 id="main-heading">📦 Porównanie cen boxów z kartami piłkarskimi</h1>

        <div class="rates">
            <strong id="rates-label">Orientacyjne kursy walut:</strong><br>
            EUR/PLN: <span id="eurpln">...</span> |
            USD/PLN: <span id="usdpln">...</span> |
            UK Tax: <span id="gbptax">...</span>
        </div>

        <div class="creator">
            <strong>Biwekson & Friends</strong><br>
            TikTok: <a id="tiktok-link" href="#" target="_blank">link</a> |
            Instagram: <a id="instagram-link" href="#" target="_blank">link</a>
        </div>

        <div class="update">
            <strong id="update-label">Aktualizacja danych:</strong>
            <span id="last-update">...</span>
        </div>

        <div style="margin-top: 10px;">
            <span id="lang-label">🌍 Język:</span>
            <button id="lang-pl">PL</button>
            <button id="lang-en">EN</button>
        </div>

    </div>

    <div class="top-right">
        <a href="https://www.tiktok.com/@biwekson/video/7619650676280364320" target="_blank">
            <img src="logo_biwekson.jpg" alt="logo">
        </a>
    </div>

</div>

<div class="filters">
    <label><span id="filter-sklep-label">Sklep:</span> <select id="filter-sklep" multiple></select></label>
    <label><span id="filter-sezon-label">Sezon:</span> <select id="filter-sezon" multiple></select></label>
    <label><span id="filter-team-label">Team:</span> <select id="filter-team" multiple></select></label>
    <label><span id="filter-producent-label">Producent:</span> <select id="filter-producent" multiple></select></label>
    <label><span id="filter-typboxa-label">Typ boxa:</span> <select id="filter-typboxa" multiple></select></label>
</div>

<table id="produkty" class="display responsive nowrap" style="width:100%">
    <thead>
        <tr id="table-headers">
            <th>Produkt</th>
            <th>Cena</th>
            <th>Waluta</th>
            <th>Sklep</th>
            <th>Sezon</th>
            <th>Producent</th>
            <th>Typ karty</th>
            <th>Typ boxa</th>
            <th>Team</th>
            <th>Cena box (PLN)</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
$(document).ready(function() {

    // 🔹 1️⃣ Rozbudowane tłumaczenia UI oraz DataTables
    const translations = {
        PL: {
            ui: {
                pageTitle: "Boxy – Tabela produktów",
                mainHeading: "📦 Porównanie cen boxów z kartami piłkarskimi",
                ratesLabel: "Orientacyjne kursy walut:",
                updateLabel: "Aktualizacja danych:",
                langLabel: "🌍 Język:",
                loading: "ładowanie...",
                noInfo: "brak informacji",
                filters: {
                    sklep: "Sklep:",
                    sezon: "Sezon:",
                    team: "Team:",
                    producent: "Producent:",
                    typBoxa: "Typ boxa:",
                    placeholder: "Wybierz..."
                },
                tableHeaders: ["Produkt", "Cena", "Waluta", "Sklep", "Sezon", "Producent", "Typ karty", "Typ boxa", "Team", "Cena box (PLN)"]
            },
            dt: {
                lengthMenu: "Pokaż _MENU_ boxów",
                info: "Pokazuję od _START_ do _END_ z _TOTAL_ boxów",
                infoEmpty: "Brak boxów do wyświetlenia",
                infoFiltered: "(przefiltrowano z _MAX_ wszystkich boxów)",
                zeroRecords: "Brak wyników",
                search: "Szukaj:",
                paginate: { first: "Pierwsza", last: "Ostatnia", next: "Następna", previous: "Poprzednia" }
            }
        },
        EN: {
            ui: {
                pageTitle: "Boxes – Product Table",
                mainHeading: "📦 Football Card Boxes Price Comparison",
                ratesLabel: "Estimated Exchange Rates:",
                updateLabel: "Data Update:",
                langLabel: "🌍 Language:",
                loading: "loading...",
                noInfo: "no information",
                filters: {
                    sklep: "Store:",
                    sezon: "Season:",
                    team: "Team:",
                    producent: "Manufacturer:",
                    typBoxa: "Box Type:",
                    placeholder: "Select..."
                },
                tableHeaders: ["Product", "Price", "Currency", "Store", "Season", "Manufacturer", "Card Type", "Box Type", "Team", "Box Price (PLN)"]
            },
            dt: {
                lengthMenu: "Show _MENU_ boxes",
                info: "Showing _START_ to _END_ of _TOTAL_ boxes",
                infoEmpty: "No boxes available",
                infoFiltered: "(filtered from _MAX_ total boxes)",
                zeroRecords: "No results found",
                search: "Search:",
                paginate: { first: "First", last: "Last", next: "Next", previous: "Previous" }
            }
        }
    };

    let table;
    let globalUpdateDate = null;

    // 🔹 2️⃣ Funkcja zmieniająca teksty w HTML i przeładowująca tabelę
    function updateUI(lang) {
        const ui = translations[lang].ui;

        // Tłumaczenie tekstów statycznych
        document.getElementById('page-title').innerText = ui.pageTitle;
        document.getElementById('main-heading').innerText = ui.mainHeading;
        document.getElementById('rates-label').innerText = ui.ratesLabel;
        document.getElementById('update-label').innerText = ui.updateLabel;
        document.getElementById('lang-label').innerText = ui.langLabel;

        // Tłumaczenie etykiet filtrów
        document.getElementById('filter-sklep-label').innerText = ui.filters.sklep;
        document.getElementById('filter-sezon-label').innerText = ui.filters.sezon;
        document.getElementById('filter-team-label').innerText = ui.filters.team;
        document.getElementById('filter-producent-label').innerText = ui.filters.producent;
        document.getElementById('filter-typboxa-label').innerText = ui.filters.typBoxa;

        // Tłumaczenie nagłówków tabeli
        const ths = document.querySelectorAll('#table-headers th');
        ui.tableHeaders.forEach((text, index) => {
            if (ths[index]) ths[index].innerText = text;
        });

        // Formatowanie daty zgodnie z językiem
        const lastUpdateElem = document.getElementById('last-update');
        if (globalUpdateDate) {
            const options = { 
                day: "2-digit", month: "2-digit", year: "numeric",
                hour: "2-digit", minute: "2-digit", second: "2-digit",
                hour12: false, timeZone: "Europe/Warsaw"
            };
            const locale = lang === 'PL' ? "pl-PL" : "en-GB";
            lastUpdateElem.innerText = globalUpdateDate.toLocaleString(locale, options);
        } else {
            lastUpdateElem.innerText = ui.noInfo;
        }

        // Aktualizacja Select2 (aby odświeżyć placeholder)
        $("#filter-sklep, #filter-sezon, #filter-team, #filter-producent, #filter-typboxa").select2({
            placeholder: ui.filters.placeholder,
            allowClear: true
        });

        // Na koniec ładujemy na nowo tabelę
        initTable(lang);
    }

    // 🔹 3️⃣ Funkcja inicjalizująca DataTable
    function initTable(lang) {
        if ($.fn.DataTable.isDataTable('#produkty')) {
            table.destroy();
        }

        table = $('#produkty').DataTable({
            pageLength: 25,
            deferRender: true,
            processing: true,
            fixedHeader: true,
            responsive: true,
            language: translations[lang].dt
        });
    }

    // 🔹 4️⃣ Wczytanie config.csv
    Papa.parse("config.csv", {
        download: true,
        header: false,
        delimiter: ";",
        skipEmptyLines: true,
        complete: function(results) {
            const config = {};
            results.data.forEach(row => {
                if(row[0] && row[1]) config[row[0]] = row[1].trim();
            });

            const eur = config.EUR ? config.EUR.replace(",", ".") : "0";
            const usd = config.USD ? config.USD.replace(",", ".") : "0";
            const gbpText = config.GB_Tax ? config.GB_Tax.replace(",", ".") : "0";
            const gbp = (parseFloat(gbpText) * 100).toFixed(0) + "%";

            document.getElementById("eurpln").innerText = eur;
            document.getElementById("usdpln").innerText = usd;
            document.getElementById("gbptax").innerText = gbp;

            if(config.TIKTOK_LINK) document.getElementById("tiktok-link").href = config.TIKTOK_LINK;
            if(config.INSTAGRAM_LINK) document.getElementById("instagram-link").href = config.INSTAGRAM_LINK;

            if(config.OPIS) {
                const opisElem = document.createElement("p");
                opisElem.innerText = config.OPIS;
                document.querySelector(".creator").appendChild(opisElem);
            }

            // Przechwycenie daty do zmiennej globalnej, aby formatować ją w updateUI()
            if(config.OSTATNIE_URUCHOMIENIE) {
                const excelDate = parseFloat(config.OSTATNIE_URUCHOMIENIE.replace(",", "."));
                globalUpdateDate = new Date((excelDate - 25569) * 86400 * 1000);
            }
        }
    });

    // 🔹 5️⃣ Wczytanie danych CSV z produktami
    Papa.parse("export.csv", {
        download: true,
        header: true,
        delimiter: ";",
        complete: function(results) {
            var data = results.data;

            data.forEach(function(row) {
                if (!row.Produkt || row.Produkt.trim() === "") return;

                // Bezpieczne parsowanie liczby do atrybutu data-order
                let cenaRaw = row.cena_box_PLN ? row.cena_box_PLN.replace(",", ".") : "0";
                let cenaNumeric = parseFloat(cenaRaw) || 0;
                let cenaFormatted = cenaNumeric.toFixed(2).replace(".", ",");

                $('#produkty tbody').append(`
                    <tr>
                        <td>${row.Produkt}</td>
                        <td>${row.Box}</td>
                        <td>${row.Waluta}</td>
                        <td>${row.Sklep}</td>
                        <td>${row.Sezon}</td>
                        <td>${row.Producent}</td>
                        <td>${row["Typ karty"] || ""}</td>
                        <td>${row["Typ boxa"] || ""}</td>
                        <td>${row.Team || ""}</td>
                        <td data-order="${cenaNumeric}">${cenaFormatted}</td>
                    </tr>
                `);
            });

            // 🔹 6️⃣ Pierwsze uruchomienie po wczytaniu danych (domyślnie PL)
            updateUI('PL'); 

            // 🔹 7️⃣ Eventy przycisków językowych
            $('#lang-pl').on('click', function() { updateUI('PL'); });
            $('#lang-en').on('click', function() { updateUI('EN'); });

            // 🔹 8️⃣ Funkcja uzupełniająca filtry
            function fillFilter(columnIndex, selectId, reverse=false) {
                var column = table.column(columnIndex);
                var select = $(selectId);

                let dataArray = column.data().toArray();
                dataArray = dataArray.filter(d => d && d.trim() !== "");
                dataArray = [...new Set(dataArray)];
                dataArray.sort((a, b) => a.localeCompare(b, 'pl'));
                if(reverse) dataArray.reverse();

                select.empty();
                dataArray.forEach(function(d) {
                    // Dodajemy opcje. Placeholdery dodawane są przez updateUI/Select2
                    select.append(new Option(d, d, false, false));
                });

                select.on('change', function() {
                    var values = $(this).val();
                    if (!values || values.length === 0) {
                        column.search("").draw();
                        return;
                    }
                    var regex = values.map(v => '^' + v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '$').join('|');
                    column.search(regex, true, false).draw();
                });
            }

            // 🔹 9️⃣ Wypełnienie filtrów
            fillFilter(3, '#filter-sklep');      
            fillFilter(4, '#filter-sezon', true); 
            fillFilter(8, '#filter-team');        
            fillFilter(5, '#filter-producent', true); 
            fillFilter(7, '#filter-typboxa');     
        }
    });

});
</script>

</body>
</html>
