<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Boxy – Price Comparison</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
/* Twój CSS pozostaje bez zmian – skróciłem dla czytelności */
body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6B8DD6 100%); }
.filters-container { display: flex; gap: 10px; margin-bottom: 20px; }
.select2-container--default .select2-selection--multiple { min-height: 38px !important; }
.table-holder { overflow-x: auto; }
table.dataTable thead th { position: sticky; top: 0; background-color: #005bbb; color: white; }
</style>
</head>
<body>

<div class="filters-container">
    <div class="filter-group"><label>Sklep:</label><select id="f-shop" multiple="multiple"></select></div>
    <div class="filter-group"><label>Sezon:</label><select id="f-season" multiple="multiple"></select></div>
    <div class="filter-group"><label>Drużyna:</label><select id="f-team" multiple="multiple"></select></div>
    <div class="filter-group"><label>Marka:</label><select id="f-brand" multiple="multiple"></select></div>
    <div class="filter-group"><label>Typ:</label><select id="f-type" multiple="multiple"></select></div>
</div>

<div class="table-holder">
    <table id="mainTable" class="display nowrap" style="width:100%">
        <thead>
            <tr>
                <th>Produkt</th><th>Cena</th><th>Waluta</th><th>Sklep</th><th>Sezon</th>
                <th>Marka</th><th>Typ</th><th>Drużyna</th><th>Cena PLN</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
$(document).ready(function() {
    let table;
    let config = {};
    let shopCountryMap = {};

    Papa.parse("sklepy.csv", { download: true, header: true, delimiter: ";", complete: function(results) {
        results.data.forEach(row => { if(row.SKLEP && row.KRAJ) shopCountryMap[row.SKLEP.trim()] = row.KRAJ.trim().toLowerCase(); });
    }});

    const langData = { /* skrócone */ PL: { placeholder: "Wszystkie" }, EN: { placeholder: "All" } };

    function getFlagForShop(shop) {
        if(!shop) return "";
        const normalizedShop = shop.replace(/^https?:\/\//,'').replace(/^www\./,'').trim();
        const key = Object.keys(shopCountryMap).find(k => normalizedShop.includes(k.replace(/^www\./,'').trim()));
        if(!key) return "";
        const code = shopCountryMap[key];
        return `<img src="https://flagcdn.com/20x15/${code}.png" style="margin-right:6px; vertical-align:middle;">`;
    }

    function fillFilterText(columnIndex, selectId, desc=false, isShop=false) {
        const select = $(selectId);
        let uniqueData = table.column(columnIndex).nodes().to$().map(function(){
            return isShop ? $(this).find('a').text().trim() : $(this).text().trim();
        }).get();
        uniqueData = [...new Set(uniqueData.filter(v => v))];
        if(desc) uniqueData.reverse();
        select.empty();
        uniqueData.forEach(item => select.append(new Option(item, item)));
        select.select2({ placeholder: langData.PL.placeholder, allowClear: true, closeOnSelect: false, width: '100%' });
    }

    Papa.parse("export.csv", {
        download: true, header: true, delimiter: ";", complete: function(results) {
            results.data.forEach(row => {
                if(!row.Produkt) return;
                let cenaOryginalna = parseFloat(row.Box ? row.Box.replace(',','.') : 0);
                let cenaPLN = parseFloat(row.cena_box_PLN ? row.cena_box_PLN.replace(',','.') : 0);
                $('#mainTable tbody').append(`
                    <tr>
                        <td>${row.Produkt}</td>
                        <td class="col-price" data-order="${cenaOryginalna}">${cenaOryginalna.toFixed(2)}</td>
                        <td>${row.Waluta}</td>
                        <td>${getFlagForShop(row.Sklep)}<a href="https://${row.Sklep}" target="_blank">${row.Sklep}</a></td>
                        <td>${row.Sezon}</td>
                        <td>${row.Producent}</td>
                        <td>${row["Typ boxa"]}</td>
                        <td>${row.Team}</td>
                        <td class="col-pln" data-order="${cenaPLN}" data-pln="${cenaPLN}">${cenaPLN.toFixed(2)}</td>
                    </tr>
                `);
            });

            table = $('#mainTable').DataTable({ pageLength: 25, responsive: false, order:[[8,'asc']] });

            // wypełnianie filtrów po utworzeniu tabeli
            fillFilterText(3, '#f-shop', false, true);
            fillFilterText(4, '#f-season', true);
            fillFilterText(7, '#f-team');
            fillFilterText(5, '#f-brand', true);
            fillFilterText(6, '#f-type');

            // niestandardowy filtr
            $.fn.dataTable.ext.search.push(function(settings, data, dataIndex){
                const selectedShops = $('#f-shop').val();
                if(selectedShops && selectedShops.length>0){
                    const cell = table.cell(dataIndex,3).node();
                    if(!selectedShops.includes($(cell).find('a').text().trim())) return false;
                }
                const selectedSeasons = $('#f-season').val();
                if(selectedSeasons && selectedSeasons.length>0 && !selectedSeasons.includes(data[4].trim())) return false;
                const selectedTeams = $('#f-team').val();
                if(selectedTeams && selectedTeams.length>0 && !selectedTeams.includes(data[7].trim())) return false;
                const selectedBrands = $('#f-brand').val();
                if(selectedBrands && selectedBrands.length>0 && !selectedBrands.includes(data[5].trim())) return false;
                const selectedTypes = $('#f-type').val();
                if(selectedTypes && selectedTypes.length>0 && !selectedTypes.includes(data[6].trim())) return false;
                return true;
            });

            // event change dla wszystkich filtrów
            $('#f-shop, #f-season, #f-team, #f-brand, #f-type').on('change', function(){ table.draw(); });
        }
    });
});
</script>

</body>
</html>
