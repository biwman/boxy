<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Boxy – Tabela produktów</title>

    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <!-- PapaParse (CSV loader) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .filters {
            margin-bottom: 20px;
        }
        .filters select {
            margin-right: 10px;
            padding: 5px;
        }
    </style>
</head>

<body>

<h1>📦 Lista boxów</h1>

<div class="filters">
    <label>Sklep: <select id="filter-sklep"><option value="">Wszystkie</option></select></label>
    <label>Sezon: <select id="filter-sezon"><option value="">Wszystkie</option></select></label>
    <label>Team: <select id="filter-team"><option value="">Wszystkie</option></select></label>
    <label>Producent: <select id="filter-producent"><option value="">Wszystkie</option></select></label>
    <label>Typ boxa: <select id="filter-typboxa"><option value="">Wszystkie</option></select></label>
</div>

<table id="produkty" class="display" style="width:100%">
    <thead>
        <tr>
            <th>Produkt</th>
            <th>Box</th>
            <th>Sklep</th>
            <th>Waluta</th>
            <th>Sezon</th>
            <th>Producent</th>
            <th>Typ karty</th>
            <th>Typ boxa</th>
            <th>Team</th>
            <th>Cena box (PLN)</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
$(document).ready(function() {

    Papa.parse("export.csv", {
        download: true,
        header: true,
        delimiter: ";",
        complete: function(results) {

            var data = results.data;

            // Wstawianie wierszy do tabeli
            data.forEach(function(row) {
                if (row.Produkt) { // pomija puste linie
                    $('#produkty tbody').append(`
                        <tr>
                            <td>${row.Produkt}</td>
                            <td>${row.Box}</td>
                            <td>${row.Sklep}</td>
                            <td>${row.Waluta}</td>
                            <td>${row.Sezon}</td>
                            <td>${row.Producent}</td>
                            <td>${row["Typ karty"]}</td>
                            <td>${row["Typ boxa"]}</td>
                            <td>${row.Team}</td>
                            <td>${row.cena_box_PLN}</td>
                        </tr>
                    `);
                }
            });

            // Inicjalizacja DataTables
            var table = $('#produkty').DataTable({
                "pageLength": 25,
                "order": []
            });

            // Funkcja do tworzenia filtrów
            function fillFilter(columnIndex, selectId) {
                var column = table.column(columnIndex);
                var select = $(selectId);

                column.data().unique().sort().each(function(d) {
                    if (d && d !== "brak danych") {
                        select.append('<option value="'+d+'">'+d+'</option>');
                    }
                });

                select.on('change', function() {
                    var val = $.fn.dataTable.util.escapeRegex($(this).val());
                    column.search(val ? '^'+val+'$' : '', true, false).draw();
                });
            }

            fillFilter(2, '#filter-sklep');
            fillFilter(4, '#filter-sezon');
            fillFilter(8, '#filter-team');
            fillFilter(5, '#filter-producent');
            fillFilter(7, '#filter-typboxa');
        }
    });

});
</script>

</body>
</html>
