<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Boxy – Tabela produktów</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- DataTables CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">

<!-- Select2 -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>

<!-- Select2 JS -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<!-- PapaParse -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial, sans-serif; margin: 20px; background: linear-gradient(135deg,#e3f2fd,#f7f9fc); display:flex; flex-direction:column; align-items:center; }
.top-section { display:flex; align-items:center; justify-content:space-between; gap:60px; background:#fff; padding:25px 40px; border-radius:12px; margin:0 auto 20px auto; max-width:1200px; width:100%; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.top-left { flex:1.5; }
.top-left h1 { margin-top:0; color:#005bbb; }
.rates { font-size:16px; margin-bottom:10px; }
.creator { font-size:14px; margin-bottom:10px; line-height:1.4; }
.creator p.static-note { margin-top:5px; }
.update { font-size:13px; color:#444; }
.top-right { flex:1; display:flex; justify-content:center; align-items:center; }
.top-right img { width:220px; height:220px; object-fit:cover; border-radius:20px; transition:0.2s; }
.top-right img:hover { transform:scale(1.08); }
.filters { margin-bottom:20px; background:#fff; padding:15px; border-radius:8px; max-width:1200px; width:100%; box-shadow:0 2px 6px rgba(0,0,0,0.1); display:flex; flex-wrap:wrap; gap:15px; }
.filters label { display:flex; flex-direction:column; font-size:14px; }
#filter-sklep + .select2-container, #filter-team + .select2-container { width:260px !important; }
#filter-sezon + .select2-container, #filter-producent + .select2-container, #filter-typboxa + .select2-container { width:160px !important; }
table { font-size:14px; max-width:1200px; width:100%; }
table.dataTable thead th { background:#005bbb; color:white; }
.select2-container { min-width:170px; }
@media(max-width:768px){ .top-section{ flex-direction:column; gap:20px; } .top-right img{ width:150px; height:150px; } }
</style>
</head>
<body>

<div class="top-section">
<div class="top-left">
    <h1></h1>
    <div class="rates">
        <strong>Orientacyjne kursy walut:</strong><br>
        EUR/PLN: <span id="eurpln">ładowanie...</span> |
        USD/PLN: <span id="usdpln">ładowanie...</span> |
        UK Tax: <span id="gbptax">ładowanie...</span>
    </div>
    <div class="creator">
        <strong>Biwekson & Friends</strong><br>
        TikTok: <a id="tiktok-link" href="#" target="_blank">link</a> |
        Instagram: <a id="instagram-link" href="#" target="_blank">link</a>
        <p class="static-note"></p>
    </div>
    <div class="update">
        <strong></strong>
        <span id="last-update">ładowanie...</span>
    </div>
    <div style="margin-top:10px;">
        <span id="lang-label"></span>
        <button id="lang-pl">PL</button>
        <button id="lang-en">EN</button>
    </div>
</div>
<div class="top-right">
    <a href="https://www.tiktok.com/@biwekson/video/7619650676280364320" target="_blank">
        <img src="logo_biwekson.jpg" alt="logo">
    </a>
</div>
</div>

<div class="filters">
    <label id="label-sklep">Sklep: <select id="filter-sklep" multiple></select></label>
    <label id="label-sezon">Sezon: <select id="filter-sezon" multiple></select></label>
    <label id="label-team">Team: <select id="filter-team" multiple></select></label>
    <label id="label-producent">Producent: <select id="filter-producent" multiple></select></label>
    <label id="label-typboxa">Typ boxa: <select id="filter-typboxa" multiple></select></label>
</div>

<table id="produkty" class="display">
<thead>
<tr>
    <th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
$(document).ready(function() {

const translations = {
    PL: {
        headerTitle: "📦 Porównanie cen boxów z kartami piłkarskimi",
        projectNote: "To jest projekt niekomercyjny. Jeśli widzisz bugi – napisz na TikToka. Nie wspieram żadnego sklepu, ani żaden sklep nie wspiera mnie.",
        dataUpdate: "Aktualizacja danych:",
        languageLabel: "Język:",
        lengthMenu: "Pokaż _MENU_ boxów",
        info: "Pokazuję od _START_ do _END_ z _TOTAL_ boxów",
        infoEmpty: "Brak boxów do wyświetlenia",
        infoFiltered: "(przefiltrowano z _MAX_ wszystkich boxów)",
        zeroRecords: "Brak wyników",
        search: "Szukaj:",
        first: "Pierwsza",
        last: "Ostatnia",
        next: "Następna",
        previous: "Poprzednia",
        columns: ["Produkt","Box","Sklep","Waluta","Sezon","Producent","Typ karty","Typ boxa","Team","Cena box (PLN)"],
        filters: ["Sklep","Sezon","Team","Producent","Typ boxa"]
    },
    EN: {
        headerTitle: "📦 Comparison of football card box prices",
        projectNote: "This is a non-commercial project. If you see bugs – write to TikTok. I don't support any store, and no store supports me.",
        dataUpdate: "Data update:",
        languageLabel: "Language:",
        lengthMenu: "Show _MENU_ boxes",
        info: "Showing _START_ to _END_ of _TOTAL_ boxes",
        infoEmpty: "No boxes available",
        infoFiltered: "(filtered from _MAX_ total boxes)",
        zeroRecords: "No results found",
        search: "Search:",
        first: "First",
        last: "Last",
        next: "Next",
        previous: "Previous",
        columns: ["Product","Box","Store","Currency","Season","Manufacturer","Card Type","Box Type","Team","Box Price (PLN)"],
        filters: ["Store","Season","Team","Manufacturer","Box Type"]
    }
};

// 🔥 Config
Papa.parse("config.csv", { download:true, header:false, delimiter:";", skipEmptyLines:true,
    complete:function(results){
        const config={};
        results.data.forEach(row => { if(row[0] && row[1]) config[row[0]]=row[1].trim(); });
        const eur=config.EUR.replace(",",".");
        const usd=config.USD.replace(",",".");
        const gbp=(parseFloat(config.GB_Tax.replace(",","."))*100).toFixed(0)+"%";
        $("#eurpln").text(eur);
        $("#usdpln").text(usd);
        $("#gbptax").text(gbp);
        if(config.TIKTOK_LINK) $("#tiktok-link").attr("href",config.TIKTOK_LINK);
        if(config.INSTAGRAM_LINK) $("#instagram-link").attr("href",config.INSTAGRAM_LINK);
        if(config.OPIS){ $(".creator .static-note").text(config.OPIS); }
        if(config.OSTATNIE_URUCHOMIENIE){
            const jsDate=new Date((parseFloat(config.OSTATNIE_URUCHOMIENIE.replace(",", "."))-25569)*86400*1000);
            const options={day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false,timeZone:"Europe/Warsaw"};
            $("#last-update").text(jsDate.toLocaleString("pl-PL",options));
        }
    }
});

// 🔥 CSV products
Papa.parse("export.csv", { download:true, header:true, delimiter:";", complete:function(results){
    const data = results.data;
    data.forEach(row => {
        if(!row.Produkt || row.Produkt.trim()==="") return;
        let cena = row.cena_box_PLN? row.cena_box_PLN.replace(",",".") : "0";
        cena = parseFloat(cena).toFixed(2).replace(".",",");
        $('#produkty tbody').append(`
            <tr>
                <td>${row.Produkt}</td>
                <td>${row.Box}</td>
                <td>${row.Sklep}</td>
                <td>${row.Waluta}</td>
                <td>${row.Sezon}</td>
                <td>${row.Producent}</td>
                <td>${row["Typ karty"]}</td>
                <td>${row["Typ boxa"]}</td>
                <td>${row.Team}</td>
                <td>${cena}</td>
            </tr>
        `);
    });

let table;
function initTable(lang){
    if($.fn.DataTable.isDataTable('#produkty')){ table.destroy(); }
    table = $('#produkty').DataTable({
        pageLength:25,
        deferRender:true,
        processing:true,
        fixedHeader:true,
        responsive:true,
        language:{
            lengthMenu:translations[lang].lengthMenu,
            info:translations[lang].info,
            infoEmpty:translations[lang].infoEmpty,
            infoFiltered:translations[lang].infoFiltered,
            zeroRecords:translations[lang].zeroRecords,
            search:translations[lang].search,
            paginate:{first:translations[lang].first,last:translations[lang].last,next:translations[lang].next,previous:translations[lang].previous}
        },
        columns: translations[lang].columns.map(c=>({title:c}))
    });

    $("#filter-sklep,#filter-sezon,#filter-team,#filter-producent,#filter-typboxa").select2({ placeholder:"Wybierz...", allowClear:true });

    function fillFilter(colIdx, selectId, reverse=false){
        const column = table.column(colIdx);
        const select = $(selectId);
        let dataArray = column.data().toArray().filter(d=>d && d.trim()!=="");
        dataArray = [...new Set(dataArray)];
        dataArray.sort((a,b)=>a.localeCompare(b,'pl'));
        if(reverse) dataArray.reverse();
        select.empty();
        dataArray.forEach(d=> select.append(new Option(d,d)));
        select.on('change',function(){
            const vals=$(this).val();
            if(!vals || vals.length===0){ column.search("").draw(); return; }
            const regex = vals.map(v=>v.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
            column.search(regex,true,false).draw();
        });
    }
    fillFilter(2,'#filter-sklep');
    fillFilter(4,'#filter-sezon',true);
    fillFilter(8,'#filter-team');
    fillFilter(5,'#filter-producent',true);
    fillFilter(7,'#filter-typboxa');
}

function updateLanguage(lang){
    $('h1').text(translations[lang].headerTitle);
    $('.creator .static-note').text(translations[lang].projectNote);
    $('.update strong').text(translations[lang].dataUpdate);
    $('#lang-label').text(translations[lang].languageLabel + " ");
    initTable(lang);
}

updateLanguage('PL');

$('#lang-pl').on('click',()=>updateLanguage('PL'));
$('#lang-en').on('click',()=>updateLanguage('EN'));

}});
</script>

</body>
</html>
